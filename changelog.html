  <style>
    /* Changelog View Toggle */
    .changelog-view-toggle {
      display: flex;
      gap: var(--space-xs);
      justify-content: flex-end;
      margin-bottom: var(--space-xl);
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    .changelog-view-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--color-text-dim);
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      padding: var(--space-xs) var(--space-md);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all var(--transition-fast);
    }

    .changelog-view-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .changelog-view-btn.active {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: rgba(0, 255, 65, 0.1);
    }

    /* Timeline View */
    .timeline-view {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      padding: var(--space-xl) 0;
    }

    .timeline-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-primary);
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.4), 0 0 20px rgba(0, 255, 65, 0.2);
      transform: translateX(-50%);
    }

    .timeline-entry {
      position: relative;
      width: 50%;
      padding: 0 var(--space-2xl);
      margin-bottom: var(--space-xl);
      box-sizing: border-box;
    }

    .timeline-entry:nth-child(odd) {
      left: 0;
      text-align: right;
      padding-right: var(--space-2xl);
      padding-left: var(--space-md);
    }

    .timeline-entry:nth-child(even) {
      left: 50%;
      text-align: left;
      padding-left: var(--space-2xl);
      padding-right: var(--space-md);
    }

    .timeline-dot {
      position: absolute;
      top: var(--space-lg);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 2px solid var(--color-primary);
      z-index: var(--z-base);
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
    }

    .timeline-entry:nth-child(odd) .timeline-dot {
      right: -6px;
    }

    .timeline-entry:nth-child(even) .timeline-dot {
      left: -6px;
    }

    .timeline-dot[data-type="feature"] {
      border-color: var(--color-primary);
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
    }

    .timeline-dot[data-type="fix"] {
      border-color: var(--color-secondary);
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
    }

    .timeline-dot[data-type="improvement"] {
      border-color: var(--color-warning);
      box-shadow: 0 0 8px rgba(255, 170, 0, 0.4);
    }

    .timeline-dot[data-type="release"] {
      border-color: var(--color-secondary);
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
    }

    .timeline-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      cursor: pointer;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      text-align: left;
    }

    .timeline-card:hover {
      border-color: var(--border-color-hover);
      box-shadow: var(--shadow-card);
    }

    .timeline-card-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }

    .timeline-version {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--bg-primary);
      background: var(--color-primary);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
    }

    .timeline-date {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-dim);
    }

    .timeline-type {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      margin-left: auto;
    }

    .timeline-type[data-type="feature"] {
      color: var(--color-primary);
      background: rgba(0, 255, 65, 0.1);
      border: 1px solid rgba(0, 255, 65, 0.3);
    }

    .timeline-type[data-type="release"] {
      color: var(--color-secondary);
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .timeline-type[data-type="fix"] {
      color: var(--color-warning);
      background: rgba(255, 170, 0, 0.1);
      border: 1px solid rgba(255, 170, 0, 0.3);
    }

    .timeline-type[data-type="improvement"] {
      color: var(--color-warning);
      background: rgba(255, 170, 0, 0.1);
      border: 1px solid rgba(255, 170, 0, 0.3);
    }

    .timeline-title {
      font-family: var(--font-mono);
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text-bright);
      margin-top: var(--space-sm);
    }

    .timeline-expand-hint {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-dim);
      margin-top: var(--space-xs);
      transition: opacity var(--transition-fast);
    }

    .timeline-card.expanded .timeline-expand-hint {
      opacity: 0.4;
    }

    .timeline-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height var(--transition-slow);
    }

    .timeline-card.expanded .timeline-details {
      max-height: 500px;
    }

    .timeline-details ul {
      list-style: none;
      padding: 0;
      margin-top: var(--space-md);
      border-top: 1px solid var(--border-color);
      padding-top: var(--space-md);
    }

    .timeline-details li {
      font-size: var(--text-sm);
      color: var(--color-text-dim);
      padding: var(--space-xs) 0;
      padding-left: var(--space-lg);
      position: relative;
    }

    .timeline-details li::before {
      content: '>';
      position: absolute;
      left: 0;
      color: var(--color-primary);
      font-family: var(--font-mono);
    }

    /* Mobile: stack all entries to the right */
    @media (max-width: 767px) {
      .timeline-line {
        left: 16px;
      }

      .timeline-entry {
        width: 100%;
        left: 0 !important;
        text-align: left !important;
        padding-left: 40px !important;
        padding-right: var(--space-md) !important;
      }

      .timeline-entry:nth-child(odd) .timeline-dot,
      .timeline-entry:nth-child(even) .timeline-dot {
        left: 10px;
        right: auto;
      }
    }
  </style>

  <script>
    (function() {
      const listView = document.getElementById('changelog-timeline');
      const timelineView = document.getElementById('timeline-view');
      const viewBtns = document.querySelectorAll('.changelog-view-btn');
      let changelogData = null;

      function formatDate(dateStr) {
        return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', {
          year: 'numeric', month: 'short', day: 'numeric'
        });
      }

      function renderListView(entries) {
        if (!listView) return;
        listView.innerHTML = entries.map(entry => `
          <div class="changelog-entry">
            <div class="changelog-marker">
              <span class="changelog-version">${entry.version}</span>
              <span class="changelog-date">${formatDate(entry.date)}</span>
            </div>
            <div class="changelog-content">
              <h3 class="changelog-title">${entry.title}</h3>
              <span class="changelog-type" data-type="${entry.type}">${entry.type.toUpperCase()}</span>
              <ul class="changelog-list">
                ${entry.changes.map(c => '<li>' + c + '</li>').join('')}
              </ul>
            </div>
          </div>
        `).join('');
      }

      function renderTimelineView(entries) {
        if (!timelineView) return;
        timelineView.innerHTML = '<div class="timeline-line"></div>' +
          entries.map(entry => `
            <div class="timeline-entry">
              <div class="timeline-dot" data-type="${entry.type}"></div>
              <div class="timeline-card" role="button" tabindex="0" aria-expanded="false">
                <div class="timeline-card-header">
                  <span class="timeline-version">${entry.version}</span>
                  <span class="timeline-date">${formatDate(entry.date)}</span>
                  <span class="timeline-type" data-type="${entry.type}">${entry.type.toUpperCase()}</span>
                </div>
                <h3 class="timeline-title">${entry.title}</h3>
                <div class="timeline-expand-hint">> click to expand</div>
                <div class="timeline-details">
                  <ul>
                    ${entry.changes.map(c => '<li>' + c + '</li>').join('')}
                  </ul>
                </div>
              </div>
            </div>
          `).join('');

        /* Bind expand/collapse */
        const cards = timelineView.querySelectorAll('.timeline-card');
        cards.forEach(card => {
          const toggle = function() {
            const isExpanded = card.classList.toggle('expanded');
            card.setAttribute('aria-expanded', isExpanded);
            const hint = card.querySelector('.timeline-expand-hint');
            if (hint) hint.textContent = isExpanded ? '> click to collapse' : '> click to expand';
          };
          card.addEventListener('click', toggle);
          card.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              toggle();
            }
          });
        });
      }

      function switchView(view) {
        viewBtns.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.view === view);
        });
        if (view === 'list') {
          listView.style.display = '';
          timelineView.style.display = 'none';
        } else {
          listView.style.display = 'none';
          timelineView.style.display = '';
          if (changelogData && timelineView.children.length === 0) {
            renderTimelineView(changelogData);
          }
        }
      }

      viewBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          switchView(this.dataset.view);
        });
      });

      fetch('data/changelog.json')
        .then(res => res.json())
        .then(entries => {
          changelogData = entries;
          renderListView(entries);
        })
        .catch(() => {
          if (listView) listView.innerHTML = '<div class="empty-state">Failed to load changelog.</div>';
        });
    })();

    new CursorTrail();
  </script>
