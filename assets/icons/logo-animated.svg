<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 28" width="120" height="28">
  <style>
    .logo-bracket { fill: #00ff41; font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; }
    .logo-null { fill: #00ff41; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; }
    .logo-shift { fill: #888888; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 400; }
    .logo-line { stroke: #00ff41; stroke-width: 1; opacity: 0; }
    @keyframes draw-line { from { stroke-dashoffset: 120; } to { stroke-dashoffset: 0; } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .logo-line { stroke-dasharray: 120; stroke-dashoffset: 120; animation: draw-line 1s ease forwards 0.3s; }
    .logo-null { opacity: 0; animation: fade-in 0.5s ease forwards 0.5s; }
    .logo-shift { opacity: 0; animation: fade-in 0.5s ease forwards 0.8s; }
  </style>
  <line class="logo-line" x1="0" y1="26" x2="120" y2="26"/>
  <text class="logo-null" x="0" y="19">null</text>
  <text class="logo-shift" x="42" y="19">shift.sh</text>
</svg>
