<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Glow -->
  <circle cx="600" cy="315" r="200" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.1"/>
  <circle cx="600" cy="315" r="300" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.05"/>
  <!-- Brand -->
  <text x="600" y="260" text-anchor="middle" font-family="monospace" font-size="72" font-weight="bold" fill="#00ff41">NullShift</text>
  <text x="600" y="320" text-anchor="middle" font-family="monospace" font-size="20" fill="#888888">PRIVACY-FIRST BUILDER LABS</text>
  <!-- Pillar tags -->
  <rect x="280" y="370" width="100" height="30" rx="4" fill="rgba(0,255,65,0.1)" stroke="#00ff41" stroke-width="1"/>
  <text x="330" y="390" text-anchor="middle" font-family="monospace" font-size="12" fill="#00ff41">PRIVACY</text>
  <rect x="420" y="370" width="60" height="30" rx="4" fill="rgba(0,255,255,0.1)" stroke="#00ffff" stroke-width="1"/>
  <text x="450" y="390" text-anchor="middle" font-family="monospace" font-size="12" fill="#00ffff">AI</text>
  <rect x="520" y="370" width="120" height="30" rx="4" fill="rgba(255,0,128,0.1)" stroke="#ff0080" stroke-width="1"/>
  <text x="580" y="390" text-anchor="middle" font-family="monospace" font-size="12" fill="#ff0080">BLOCKCHAIN</text>
  <rect x="680" y="370" width="100" height="30" rx="4" fill="rgba(168,85,247,0.1)" stroke="#a855f7" stroke-width="1"/>
  <text x="730" y="390" text-anchor="middle" font-family="monospace" font-size="12" fill="#a855f7">ZK PROOFS</text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="monospace" font-size="16" fill="#333333">nullshift.sh</text>
  <!-- Top border glow -->
  <rect x="0" y="0" width="1200" height="3" fill="#00ff41" opacity="0.6"/>
</svg>
