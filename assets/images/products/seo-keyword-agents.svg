<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Search bar -->
  <rect x="100" y="40" width="400" height="40" rx="20" fill="#1a1a1a" stroke="#00ffff" stroke-width="1"/>
  <circle cx="130" cy="60" r="10" fill="none" stroke="#00ffff" stroke-width="2"/>
  <line x1="137" y1="67" x2="143" y2="73" stroke="#00ffff" stroke-width="2"/>
  <text x="155" y="65" font-family="monospace" font-size="14" fill="#888">seo keyword analysis...</text>
  <!-- Bar chart -->
  <g transform="translate(80, 100)">
    <rect x="0" y="120" width="50" height="80" rx="3" fill="#00ffff" opacity="0.8"/>
    <rect x="70" y="80" width="50" height="120" rx="3" fill="#00ffff" opacity="0.6"/>
    <rect x="140" y="40" width="50" height="160" rx="3" fill="#00ffff" opacity="0.9"/>
    <rect x="210" y="100" width="50" height="100" rx="3" fill="#00ffff" opacity="0.5"/>
    <rect x="280" y="60" width="50" height="140" rx="3" fill="#00ffff" opacity="0.7"/>
    <rect x="350" y="130" width="50" height="70" rx="3" fill="#00ffff" opacity="0.4"/>
    <!-- Labels -->
    <text x="10" y="215" font-family="monospace" font-size="9" fill="#666">vol</text>
    <text x="80" y="215" font-family="monospace" font-size="9" fill="#666">cpc</text>
    <text x="145" y="215" font-family="monospace" font-size="9" fill="#666">rank</text>
    <text x="215" y="215" font-family="monospace" font-size="9" fill="#666">diff</text>
    <text x="283" y="215" font-family="monospace" font-size="9" fill="#666">trend</text>
    <text x="355" y="215" font-family="monospace" font-size="9" fill="#666">serp</text>
  </g>
  <!-- AI badge -->
  <rect x="440" y="110" width="120" height="30" rx="4" fill="rgba(0,255,255,0.1)" stroke="#00ffff" stroke-width="1"/>
  <text x="460" y="130" font-family="monospace" font-size="11" fill="#00ffff">LLM Streaming</text>
  <rect x="440" y="150" width="120" height="30" rx="4" fill="rgba(0,255,255,0.1)" stroke="#00ffff" stroke-width="1"/>
  <text x="455" y="170" font-family="monospace" font-size="11" fill="#00ffff">4 AI Modules</text>
  <rect x="0" y="297" width="600" height="3" fill="#00ffff" opacity="0.6"/>
</svg>
