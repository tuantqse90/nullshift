<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Shield icon -->
  <path d="M300 40 L370 70 L370 150 Q370 210 300 250 Q230 210 230 150 L230 70 Z" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.8"/>
  <path d="M300 60 L350 82 L350 148 Q350 195 300 228 Q250 195 250 148 L250 82 Z" fill="rgba(0,255,255,0.05)"/>
  <!-- Eye icon in shield -->
  <ellipse cx="300" cy="130" rx="30" ry="18" fill="none" stroke="#00ffff" stroke-width="1.5"/>
  <circle cx="300" cy="130" r="8" fill="#00ffff" opacity="0.6"/>
  <circle cx="300" cy="130" r="3" fill="#0a0a0a"/>
  <!-- Detection modules -->
  <g font-family="monospace" font-size="10">
    <rect x="50" y="80" width="130" height="28" rx="4" fill="rgba(255,100,50,0.1)" stroke="#ff6432" stroke-width="1"/>
    <text x="65" y="99" fill="#ff6432">FIRE DETECT</text>
    <rect x="50" y="120" width="130" height="28" rx="4" fill="rgba(0,255,255,0.1)" stroke="#00ffff" stroke-width="1"/>
    <text x="65" y="139" fill="#00ffff">FALL DETECT</text>
    <rect x="420" y="80" width="130" height="28" rx="4" fill="rgba(168,85,247,0.1)" stroke="#a855f7" stroke-width="1"/>
    <text x="425" y="99" fill="#a855f7">SEIZURE DET</text>
    <rect x="420" y="120" width="130" height="28" rx="4" fill="rgba(0,255,65,0.1)" stroke="#00ff41" stroke-width="1"/>
    <text x="435" y="139" fill="#00ff41">SMART AC</text>
  </g>
  <!-- Raspberry Pi -->
  <rect x="230" y="260" width="140" height="25" rx="4" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="250" y="278" font-family="monospace" font-size="10" fill="#888">Raspberry Pi</text>
  <!-- Connection lines -->
  <line x1="180" y1="94" x2="230" y2="110" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="134" x2="230" y2="140" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  <line x1="420" y1="94" x2="370" y2="110" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  <line x1="420" y1="134" x2="370" y2="140" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  <rect x="0" y="297" width="600" height="3" fill="#00ffff" opacity="0.6"/>
</svg>
