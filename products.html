  <script src="js/filter.js"></script>
  <script src="js/main.js"></script>
  <script>
    initFilters({
      dataUrl: 'data/products.json',
      containerSelector: '#products-grid',
      filterBarSelector: '#products-filter',
      filterGroups: [
        {
          key: 'pillar',
          label: 'Pillars',
          values: [
            { value: 'privacy', label: 'Privacy' },
            { value: 'ai', label: 'AI' },
            { value: 'blockchain', label: 'Blockchain' },
            { value: 'zk', label: 'ZK' }
          ]
        },
        {
          key: 'status',
          label: 'Status',
          values: [
            { value: 'live', label: 'Live' },
            { value: 'building', label: 'Building' },
            { value: 'concept', label: 'Concept' }
          ]
        }
      ],
      renderCard: function(product) {
        return `
          <div class="hacker-card" data-pillar="${product.pillar}">
            <div class="card-header">
              <span class="card-title">${product.name}</span>
              <span class="status-tag" data-status="${product.status}">[${product.status.toUpperCase()}]</span>
            </div>
            <p class="card-description">${product.description}</p>
            <div class="card-footer">
              <div class="card-tags">
                ${product.tech_stack.map(t => '<span class="tech-tag">' + t + '</span>').join('')}
              </div>
              <span class="pillar-badge" data-pillar="${product.pillar}">${product.pillar.toUpperCase()}</span>
            </div>
          </div>
        `;
      }
    });
  </script>
